<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Distribuidora Jireh</title>
    <link rel="stylesheet" href="../css/Login.css" />
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <img src="../images/Iconos/Logo.png" alt="Logo Jireh" class="login-logo" />
            <h2>Iniciar Sesión</h2>
            <form class="login-form" id="login-form">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Ingresa tu usuario" required />

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required />

                <button type="submit">Ingresar</button>
            </form>
            <div id="mensaje-error" style="color: red; margin-top: 10px;"></div>
            <p class="login-footer">¿Olvidaste tu contraseña? <a
                    href="https://www.mayoclinic.org/es/diseases-conditions/alzheimers-disease/diagnosis-treatment/drc-20350453"
                    target="_blank">Recupérala
                    aquí</a></p>
        </div>
    </div>

    <script>
        const usuariosValidos = {
            admin: "admin123",
            user: "mondongo",
            gerente: "gerente_waos"
        };

        document.getElementById("login-form").addEventListener("submit", function (e) {
            e.preventDefault();

            const usuario = document.getElementById("usuario").value.trim();
            const password = document.getElementById("password").value.trim();
            const mensajeError = document.getElementById("mensaje-error");

            if (usuariosValidos[usuario] && usuariosValidos[usuario] === password) {
                localStorage.setItem("usuarioLogueado", usuario);
                window.location.href = "./Index.html";
            } else {
                mensajeError.textContent = "Usuario o contraseña incorrectos";

                // (Opcional) Limpiar después de 3 segundos
                setTimeout(() => {
                    mensajeError.textContent = "";
                }, 3000);
            }
        });
    </script>



</body>

</html>
